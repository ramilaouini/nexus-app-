<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#070a10" />
    </linearGradient>
    
    <!-- Neon Cyber Gradient -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Glowing Drop Shadow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="100" fill="url(#bg-grad)" />

  <!-- Outer Cyber Hexagon -->
  <polygon 
    points="256,70 412,160 412,340 256,430 100,340 100,160" 
    fill="none" 
    stroke="rgba(0, 229, 255, 0.15)" 
    stroke-width="8" 
  />

  <!-- Glowing Core Nexus Logo Mark ("N") -->
  <g filter="url(#glow)">
    <path 
      d="M 170,330 L 170,180 L 230,180 L 282,270 L 282,180 L 342,180 L 342,330 L 282,330 L 230,240 L 230,330 Z" 
      fill="url(#cyber-grad)" 
    />
  </g>

  <!-- High-tech corner highlights -->
  <circle cx="256" cy="70" r="6" fill="#00e5ff" />
  <circle cx="412" cy="160" r="6" fill="#a855f7" />
  <circle cx="412" cy="340" r="6" fill="#a855f7" />
  <circle cx="256" cy="430" r="6" fill="#00e5ff" />
  <circle cx="100" cy="340" r="6" fill="#00e5ff" />
  <circle cx="100" cy="160" r="6" fill="#a855f7" />
</svg>
